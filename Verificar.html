<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Club de la Gente — Verificar membresía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a7a3c;
      --verde-claro: #e8f5ee;
      --rojo: #c0392b;
      --rojo-claro: #fdecea;
      --crema: #f8f6f1;
      --tinta: #0e0e0e;
      --tinta-40: rgba(14,14,14,.4);
      --display: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Montserrat', sans-serif;
    }
    body {
      font-family: var(--sans);
      background: var(--crema);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--tinta);
      margin-bottom: 40px;
    }
    .logo__mark svg { width: 38px; height: 38px; display: block; }
    .logo__type { display: flex; flex-direction: column; line-height: 1.1; }
    .logo__type .l1 { font-family: var(--display); font-size: 10px; letter-spacing: .25em; text-transform: uppercase; }
    .logo__type span:not(.l1) { font-family: var(--display); font-size: 14px; font-weight: 600; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 32px rgba(0,0,0,.07);
    }

    /* Estado activo */
    .estado-ic {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    .estado-ic--ok { background: var(--verde-claro); }
    .estado-ic--no { background: var(--rojo-claro); }

    .estado-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .estado-lbl--ok { color: var(--verde); }
    .estado-lbl--no { color: var(--rojo); }

    .miembro-nombre {
      font-family: var(--display);
      font-size: 32px; font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .miembro-tipo {
      font-size: 13px; color: var(--tinta-40);
      margin-bottom: 28px;
    }

    .divider { border: none; border-top: 1px solid #ebebeb; margin: 20px 0; }

    .detalle { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .detalle__lbl { font-size: 12px; color: var(--tinta-40); }
    .detalle__val { font-size: 13px; font-weight: 600; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 700; letter-spacing: .05em;
    }
    .badge--ok { background: var(--verde-claro); color: var(--verde); }
    .badge--no { background: var(--rojo-claro); color: var(--rojo); }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .footer-note {
      margin-top: 28px;
      font-size: 11px; color: var(--tinta-40);
      line-height: 1.5;
    }

    .estado-ic--lim { background: #fef3c7; }
    .estado-lbl--lim { color: #b45309; }
    .badge--lim { background: #fef3c7; color: #b45309; }

    /* Loading / Error */
    .loading { font-size: 14px; color: var(--tinta-40); text-align: center; }
    .error-msg { color: var(--rojo); font-size: 14px; font-weight: 600; text-align: center; }
  </style>
</head>
<body>

  <a class="logo" href="El Club de la Gente.html">
    <span class="logo__mark">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18.5" stroke="#0E0E0E" stroke-width="1.4"/>
        <circle cx="20" cy="20" r="14" stroke="#008000" stroke-width="1.4"/>
        <text x="20" y="20" text-anchor="middle" dominant-baseline="central"
              font-family="Cormorant Garamond, serif" font-size="20" font-weight="700" fill="#0E0E0E">G</text>
      </svg>
    </span>
    <span class="logo__type">
      <span class="l1">El</span>
      <span>Club de la</span>
      <span>Gente</span>
    </span>
  </a>

  <div class="card" id="card">
    <p class="loading">Verificando membresía...</p>
  </div>

  <p class="footer-note" style="max-width:360px;text-align:center;margin-top:20px">
    Esta verificación es en tiempo real. Si el estado es <strong>Activo</strong>, el miembro tiene derecho al descuento correspondiente.
  </p>

  <script>
    // Verificar ID antes de cargar Supabase
    const _id = new URLSearchParams(location.search).get("id");
    if (!_id) {
      document.getElementById("card").innerHTML = `
        <div class="estado-ic estado-ic--no">✗</div>
        <div class="estado-lbl estado-lbl--no">QR inválido</div>
        <p class="error-msg" style="margin-top:8px">Este QR no contiene un ID de miembro válido.</p>`;
    }
  </script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(
      "https://egwaedadpqfwnbfosiao.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnd2FlZGFkcHFmd25iZm9zaWFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc2ODcsImV4cCI6MjA5NjM0MzY4N30.NrBPX8HhTcs_y-QG3o_GoEAednFc0TqUunkQe1dblT4"
    );

    const card = document.getElementById("card");
    const id = new URLSearchParams(location.search).get("id");

    const btnStyle = (bg, color="#fff") => `display:block;width:100%;padding:14px;background:${bg};color:${color};border-radius:12px;text-align:center;text-decoration:none;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;margin-top:8px;letter-spacing:.02em;border:none;cursor:pointer;`;

    function renderOk(p, usos, esPremium) {
      const rolLabel = { miembro: "Miembro", aliado: "Aliado comercial", profesional: "Profesional" }[p.rol] || "Miembro";
      const planLabel = esPremium ? "Premium · Ilimitado" : `Básica · ${usos}/2 usos este mes`;
      const dirUrl = `Directorio.html?miembro=${id}&wa=${encodeURIComponent(p.whatsapp||"")}&plan=${p.plan||"basica"}&usos=${usos}`;
      card.innerHTML = `
        <div class="estado-ic estado-ic--ok">✓</div>
        <div class="estado-lbl estado-lbl--ok">Membresía activa</div>
        <div class="miembro-nombre">${p.nombre}</div>
        <div class="miembro-tipo">${rolLabel} · El Club de la Gente</div>
        <hr class="divider">
        <div class="detalle"><span class="detalle__lbl">Estado</span><span class="badge badge--ok"><span class="dot"></span> Activo</span></div>
        <div class="detalle"><span class="detalle__lbl">Plan</span><span class="detalle__val">${planLabel}</span></div>
        <div class="detalle"><span class="detalle__lbl">Verificado</span><span class="detalle__val">${new Date().toLocaleString("es-CO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span></div>
        <hr class="divider">
        <a href="${dirUrl}" style="${btnStyle("#1a7a3c")}">Ver aliados y descuentos &rarr;</a>
      `;
    }

    function renderLimite(p) {
      const wa = (p.whatsapp||"").replace(/\D/g,"");
      const numero = wa.startsWith("57") ? wa : "57"+wa;
      const msg = `¡Hola ${p.nombre}! 👋 Llegaste al límite de 2 descuentos del mes con tu membresía Básica.\n\n¿Quieres descuentos ilimitados? Actualiza a Premium por solo $20.000/mes y aprovecha el Club sin restricciones.\n\nEl Club de la Gente`;
      const waUrl = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
      card.innerHTML = `
        <div class="estado-ic estado-ic--lim">⚠</div>
        <div class="estado-lbl estado-lbl--lim">Límite mensual alcanzado</div>
        <div class="miembro-nombre">${p.nombre}</div>
        <div class="miembro-tipo">Membresía Básica · El Club de la Gente</div>
        <hr class="divider">
        <div class="detalle"><span class="detalle__lbl">Estado</span><span class="badge badge--lim"><span class="dot"></span> Límite 2/2</span></div>
        <div class="detalle"><span class="detalle__lbl">Descuentos usados</span><span class="detalle__val">2 de 2 este mes</span></div>
        <hr class="divider">
        <p style="font-size:13px;color:#888;margin-bottom:12px;line-height:1.5">Este miembro usó sus 2 descuentos del mes. No aplica más descuentos hasta el próximo mes.</p>
        <a href="Planes.html" style="${btnStyle("#1a7a3c")}">Actualizar a Premium &rarr;</a>
        ${wa ? `<a href="${waUrl}" style="${btnStyle("#fef3c7","#b45309")}">Notificar al miembro por WhatsApp</a>` : ""}
      `;
    }

    function renderNo(msg) {
      card.innerHTML = `
        <div class="estado-ic estado-ic--no">✗</div>
        <div class="estado-lbl estado-lbl--no">Membresía no válida</div>
        <p class="error-msg" style="margin-top:8px">${msg}</p>
        <hr class="divider">
        <div class="detalle"><span class="detalle__lbl">Estado</span><span class="badge badge--no"><span class="dot"></span> Inactivo</span></div>
        <p style="margin-top:20px;font-size:13px;color:#888">No se puede aplicar el descuento. El miembro debe renovar su membresía.</p>
      `;
    }

    if (!id) return;

    try {
      const { data, error } = await supabase
        .from("perfiles")
        .select("nombre, rol, whatsapp, plan")
        .eq("id", id)
        .single();

      if (error || !data) {
        renderNo("Miembro no encontrado. Verifica que el QR sea válido.");
        return;
      }

      const esPremium = data.plan === "premium" || data.plan === "vitalicia";
      let usos = 0;

      if (!esPremium) {
        const inicioMes = new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
        const { count } = await supabase
          .from("descuentos")
          .select("id", { count: "exact", head: true })
          .eq("miembro_id", id)
          .gte("created_at", inicioMes.toISOString());
        usos = count || 0;
      }

      if (!esPremium && usos >= 2) {
        renderLimite(data);
      } else {
        renderOk(data, usos, esPremium);
      }
    } catch (_) {
      renderNo("Error al verificar. Revisa tu conexión e intenta de nuevo.");
    }
  </script>

</body>
</html>
