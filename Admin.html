<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Club de la Gente — Backoffice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css?v=2">
  <style>
    body { background: #0A0A0A; }
    /* Chips de categoría en modal */
    .fa-chip {
      background: none; border: 1.5px solid rgba(26,26,24,.18); border-radius: 20px;
      padding: 6px 14px; font-family: var(--cuerpo); font-size: 13px;
      color: rgba(26,26,24,.6); cursor: pointer; transition: all .15s;
    }
    .fa-chip:hover { border-color: #1f9d3c; color: #1f9d3c; }
    .fa-chip.is-on { background: #1f9d3c; border-color: #1f9d3c; color: #fff; font-weight: 600; }
    /* Modal fondo blanco */
    .ad-modal {
      background: #fff !important;
      color: #1a1a18 !important;
      box-shadow: 0 20px 60px rgba(0,0,0,.35) !important;
      border: none !important;
    }
    .ad-modal__head {
      background: #fff !important;
      border-bottom: 1px solid rgba(26,26,24,.12) !important;
    }
    .ad-modal__head h1 { color: #1a1a18 !important; }
    .ad-modal__head p  { color: rgba(26,26,24,.5) !important; }
    .ad-modal__close {
      border-color: rgba(26,26,24,.15) !important;
      color: rgba(26,26,24,.5) !important;
    }
    .ad-modal__close:hover { background: #f0eeea !important; color: #1a1a18 !important; }
    .ad-modal .ad-field label { color: rgba(26,26,24,.55) !important; }
    .ad-modal .ad-field input,
    .ad-modal .ad-field select,
    .ad-modal .ad-field textarea {
      background: #f5f4f0 !important;
      color: #1a1a18 !important;
      border: 1.5px solid rgba(26,26,24,.13) !important;
    }
    .ad-modal .ad-field input::placeholder,
    .ad-modal .ad-field textarea::placeholder { color: rgba(26,26,24,.3) !important; }
    .ad-modal .ad-field input:focus,
    .ad-modal .ad-field textarea:focus { border-color: #1f9d3c !important; }
    .ad-modal .ad-field input[type=file] {
      background: none !important;
      border: 1.5px dashed rgba(26,26,24,.2) !important;
      color: rgba(26,26,24,.5) !important;
    }
    .ad-modal .ad-btn { background: #f0eeea !important; border-color: rgba(26,26,24,.12) !important; color: #1a1a18 !important; }
    .ad-modal .ad-btn:hover { background: #e5e2dc !important; }
    .ad-modal .ad-btn--verde { background: #1f9d3c !important; border-color: #1f9d3c !important; color: #fff !important; }
    .ad-modal .ad-btn--verde:hover { background: #178a32 !important; }
    .ad-modal .ad-toolbar { border-top: 1px solid rgba(26,26,24,.1) !important; padding-top: 16px !important; margin-top: 4px !important; }
    #login-screen input:focus { border-color: #1f9d3c !important; }
    #login-btn:hover { background: #178a32 !important; }
  </style>
</head>
<body>

  <!-- ============================================================
       PANTALLA DE LOGIN
       ============================================================ -->
  <div id="login-screen" style="position:fixed;inset:0;background:#0A0A0A;display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px">
    <div style="width:100%;max-width:380px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:40px;justify-content:center">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:38px;height:38px;flex-shrink:0">
          <circle cx="20" cy="20" r="18.5" stroke="#F2F0EA" stroke-width="1.4"/>
          <circle cx="20" cy="20" r="14" stroke="#6fdc8c" stroke-width="1.4"/>
          <text x="20" y="20" text-anchor="middle" dominant-baseline="central" font-family="Cormorant Garamond, serif" font-size="20" font-weight="700" fill="#F2F0EA">G</text>
        </svg>
        <div style="font-family:'Cormorant Garamond',serif;color:#F2F0EA;line-height:1.1">
          <div style="font-size:9px;letter-spacing:.25em;text-transform:uppercase;opacity:.5">El</div>
          <div style="font-size:15px;font-weight:600">Club de la Gente</div>
        </div>
      </div>
      <div style="background:#131313;border:1px solid rgba(248,246,241,.09);border-radius:16px;padding:32px">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#F2F0EA;margin-bottom:6px">Acceso Admin</h2>
        <p style="font-size:12px;color:rgba(242,240,234,.4);margin-bottom:28px">Ingresa tus credenciales para continuar</p>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:11px;font-weight:600;color:rgba(242,240,234,.4);margin-bottom:7px;letter-spacing:.06em">CORREO</label>
          <input id="login-email" type="email" placeholder="tu@correo.com" autocomplete="email" style="width:100%;font-family:'Montserrat',sans-serif;font-size:13.5px;color:#F2F0EA;padding:12px 14px;border:1.5px solid rgba(248,246,241,.1);border-radius:8px;background:#0A0A0A;outline:none;transition:border-color .2s;box-sizing:border-box">
        </div>
        <div style="margin-bottom:24px">
          <label style="display:block;font-size:11px;font-weight:600;color:rgba(242,240,234,.4);margin-bottom:7px;letter-spacing:.06em">CONTRASEÑA</label>
          <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" style="width:100%;font-family:'Montserrat',sans-serif;font-size:13.5px;color:#F2F0EA;padding:12px 14px;border:1.5px solid rgba(248,246,241,.1);border-radius:8px;background:#0A0A0A;outline:none;transition:border-color .2s;box-sizing:border-box">
        </div>
        <div id="login-error" style="display:none;font-size:12px;color:#e2685f;margin-bottom:16px;padding:10px 14px;background:rgba(226,104,95,.1);border-radius:8px;border:1px solid rgba(226,104,95,.2)"></div>
        <button id="login-btn" style="width:100%;font-family:'Montserrat',sans-serif;font-size:13.5px;font-weight:600;color:#fff;background:#1f9d3c;border:none;border-radius:8px;padding:14px;cursor:pointer;transition:background .18s">Ingresar</button>
      </div>
    </div>
  </div>

  <div class="admin" id="admin" style="display:none">
    <div class="ad-backdrop" id="ad-backdrop"></div>

    <!-- ============================================================
         SIDEBAR
         ============================================================ -->
    <aside class="ad-side">
      <div class="ad-side__brand">
        <span class="logo__mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18.5" stroke="#F2F0EA" stroke-width="1.4"/>
            <circle cx="20" cy="20" r="14" stroke="#6fdc8c" stroke-width="1.4"/>
            <text x="20" y="20" text-anchor="middle" dominant-baseline="central" font-family="Cormorant Garamond, serif" font-size="20" font-weight="700" fill="#F2F0EA">G</text>
          </svg>
        </span>
        <span class="logo__type"><span class="l1">El</span><span>Club de la</span><span>Gente</span></span>
        <span class="ad-badge">Admin</span>
      </div>

      <nav class="ad-nav">
        <button class="ad-link" data-panel="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</button>
        <div class="ad-nav__lbl">Gestión</div>
        <button class="ad-link" data-panel="miembros"><i data-lucide="users"></i> Miembros</button>
        <button class="ad-link" data-panel="aliados"><i data-lucide="store"></i> Aliados</button>
        <button class="ad-link" data-panel="profesionales"><i data-lucide="briefcase"></i> Profesionales</button>
        <button class="ad-link" data-panel="contenido"><i data-lucide="image"></i> Contenido</button>
        <button class="ad-link" data-panel="programas"><i data-lucide="heart-handshake"></i> Programas sociales</button>
        <div class="ad-nav__lbl">Finanzas</div>
        <button class="ad-link" data-panel="ventas"><i data-lucide="banknote"></i> Ventas</button>
        <button class="ad-link" data-panel="suscripciones"><i data-lucide="repeat"></i> Suscripciones</button>
        <div class="ad-nav__lbl">Comunicación</div>
        <button class="ad-link" data-panel="agente"><i data-lucide="message-circle"></i> Agente WhatsApp <span class="ad-link__count" id="ag-nav-count"></span></button>
        <div class="ad-nav__lbl">Sistema</div>
        <button class="ad-link" data-panel="config"><i data-lucide="settings"></i> Configuración</button>
      </nav>

      <div class="ad-side__foot">
        <div class="ad-side__admin">
          <span class="av" id="side-av">AG</span>
          <div style="flex:1;min-width:0"><div class="n" id="side-name">Admin · El Club</div><div class="r">Fusagasugá</div></div>
          <button id="btn-logout" title="Cerrar sesión" style="width:32px;height:32px;border-radius:7px;border:1px solid rgba(248,246,241,.1);background:none;color:rgba(242,240,234,.4);display:grid;place-items:center;cursor:pointer;flex-shrink:0;transition:color .18s,border-color .18s" onmouseover="this.style.color='#e2685f';this.style.borderColor='rgba(226,104,95,.3)'" onmouseout="this.style.color='rgba(242,240,234,.4)';this.style.borderColor='rgba(248,246,241,.1)'"><i data-lucide="log-out"></i></button>
        </div>
      </div>
    </aside>

    <!-- ============================================================
         MAIN
         ============================================================ -->
    <div class="ad-main">
      <header class="ad-top">
        <div style="display:flex;align-items:center;gap:14px">
          <button class="ad-burger" id="ad-burger"><i data-lucide="menu"></i></button>
          <div class="ad-top__left">
            <h1 id="ad-h1">Dashboard</h1>
            <p id="ad-sub">Vista general en tiempo real</p>
          </div>
        </div>
        <div class="ad-top__right">
          <span class="ad-date"><i data-lucide="calendar-days"></i><span id="ad-date">—</span></span>
          <button class="ad-iconbtn"><i data-lucide="search"></i></button>
          <button class="ad-iconbtn"><i data-lucide="bell"></i><span class="dot"></span></button>
        </div>
      </header>

      <div class="ad-content">
        <section class="ad-panel" id="p-dashboard" data-screen-label="Admin · Dashboard"></section>
        <section class="ad-panel" id="p-miembros" data-screen-label="Admin · Miembros"></section>
        <section class="ad-panel" id="p-aliados" data-screen-label="Admin · Aliados"></section>
        <section class="ad-panel" id="p-profesionales" data-screen-label="Admin · Profesionales"></section>
        <section class="ad-panel" id="p-contenido" data-screen-label="Admin · Contenido"></section>
        <section class="ad-panel" id="p-programas" data-screen-label="Admin · Programas"></section>
        <section class="ad-panel" id="p-ventas" data-screen-label="Admin · Ventas"></section>
        <section class="ad-panel" id="p-suscripciones" data-screen-label="Admin · Suscripciones"></section>
        <section class="ad-panel" id="p-agente" data-screen-label="Admin · Agente WhatsApp"></section>
        <section class="ad-panel" id="p-config" data-screen-label="Admin · Configuración"></section>
      </div>
    </div>
  </div>

  <!-- ============================================================
       MODAL
       ============================================================ -->
  <div class="ad-modal-ov" id="ad-modal-ov">
    <div class="ad-modal">
      <div class="ad-modal__head">
        <div><h1 id="modal-title" style="font-family:var(--display);font-size:24px;font-weight:600;line-height:1.05">—</h1><p id="modal-sub" style="font-size:12px;color:rgba(242,240,234,.4);margin-top:4px">—</p></div>
        <button class="ad-modal__close" id="modal-close"><i data-lucide="x"></i></button>
      </div>
      <div class="ad-modal__body" id="modal-body"></div>
    </div>
  </div>

  <div class="ad-toast" id="ad-toast"></div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="admin-data.js"></script>
  <script src="admin.js"></script>
  <script type="module">
/* ---- ADMIN CMS — inline para evitar caché ---- */
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://egwaedadpqfwnbfosiao.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnd2FlZGFkcHFmd25iZm9zaWFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc2ODcsImV4cCI6MjA5NjM0MzY4N30.NrBPX8HhTcs_y-QG3o_GoEAednFc0TqUunkQe1dblT4"
);
const $ = (s) => document.querySelector(s);
const ic = (n) => `<i data-lucide="${n}"></i>`;
let _aliados=[], _anuncios=[], _programas=[], _profesionales=[];

const CATS=['Restaurante / Cafetería','Salud y bienestar','Belleza y estética','Barbería','Odontología','Veterinaria','Ropa y accesorios','Supermercado / Tienda','Educación','Deporte y gym','Tecnología'];

function toast(msg){const t=$("#ad-toast");if(!t)return;t.textContent=msg;t.classList.add("is-show");setTimeout(()=>t.classList.remove("is-show"),3000);}
function abrirModal(t,s,b){$("#modal-title").textContent=t;$("#modal-sub").textContent=s;$("#modal-body").innerHTML=b;$("#ad-modal-ov").classList.add("is-open");if(window.lucide)lucide.createIcons();}
async function subirImagen(file){const ext=file.name.split('.').pop();const path=`${Date.now()}-${Math.random().toString(36).substr(2,5)}.${ext}`;const{error}=await supabase.storage.from('contenido').upload(path,file);if(error)throw error;return supabase.storage.from('contenido').getPublicUrl(path).data.publicUrl;}

/* ---- ALIADOS ---- */
async function cargarAliados(){
  const{data}=await supabase.from('aliados').select('*').order('created_at',{ascending:false});
  _aliados=data||[];
  const tbody=$("#a-body");if(!tbody)return;
  if(!_aliados.length){tbody.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:40px;color:rgba(242,240,234,.3)">Aún no hay aliados →</td></tr>`;return;}
  tbody.innerHTML=_aliados.map(a=>`<tr>
    <td><div class="ad-cell-user">${a.imagen_url?`<img src="${a.imagen_url}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0">`:`<span class="ad-av">${(a.nombre||'?')[0]}</span>`}<div class="ad-cell-user__name">${a.nombre}</div></div></td>
    <td><span class="ad-table__num">${a.categoria||'—'}</span></td>
    <td><span class="ad-num-strong verde">${a.descuento||'—'}</span></td>
    <td>${a.whatsapp||'—'}</td>
    <td style="text-align:right"><div style="display:flex;gap:8px;justify-content:flex-end;align-items:center">
      <span class="ad-pill ${a.activo?'activo':'inactivo'}" data-tog-aliado="${a.id}" data-activo="${a.activo}" style="cursor:pointer"><span class="d"></span>${a.activo?'Activo':'Inactivo'}</span>
      <button class="ad-btn" data-promos-aliado="${a.id}" data-nom-aliado="${(a.nombre||'').replace(/"/g,'&quot;')}" title="Promociones">${ic("tag")}</button>
      <button class="ad-btn" data-ed-aliado="${a.id}">${ic("pencil")}</button>
      <button class="ad-btn" data-rm-aliado="${a.id}">${ic("trash-2")}</button>
    </div></td></tr>`).join('');
  if(window.lucide)lucide.createIcons();
}
async function cargarPostulaciones(){
  const{data}=await supabase.from('aliados_postulaciones').select('*').eq('estado','pendiente').order('created_at',{ascending:false});
  const post=data||[];const panel=$("#p-aliados");if(!panel||!post.length)return;
  const tableWrap=panel.querySelector('.ad-table-wrap');if(!tableWrap)return;
  const html=`<div id="postulaciones-wrap" style="margin-bottom:20px">
    <div style="font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(242,240,234,.35);margin-bottom:10px">Postulaciones pendientes (${post.length})</div>
    ${post.map(p=>{
      const wa=(p.whatsapp||'').replace(/\D/g,'');
      const msg=encodeURIComponent(`Hola ${p.nombre_responsable||''},\n\nLa postulación de *${p.nombre_negocio||'tu negocio'}* en El Club de la Gente fue aprobada ✅\n\nPara activar tu perfil de aliado y aparecer en el directorio, realiza el pago de membresía mensual ($20.000 COP) aquí:\n\n[Agrega el link de pago aquí]\n\n¡Bienvenido al Club!\nEl equipo de El Club de la Gente`);
      const waUrl=wa?`https://wa.me/57${wa}?text=${msg}`:'';
      return `<div style="display:flex;gap:12px;padding:14px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;margin-bottom:2px">${p.nombre_negocio||'(sin nombre)'}</div>
          <div style="font-size:12px;color:rgba(242,240,234,.4)">${p.categoria||''} · ${p.nombre_responsable||''} · ${p.whatsapp||''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)">Pendiente</span>
          ${waUrl?`<button class="ad-btn ad-btn--verde" data-aprobar-post="${p.id}" data-wa-post="${waUrl}" data-nom-post="${(p.nombre_negocio||'').replace(/"/g,'&quot;')}" data-cat-post="${(p.categoria||'').replace(/"/g,'&quot;')}" data-tel-post="${(p.whatsapp||'').replace(/"/g,'&quot;')}" style="font-size:12px">${ic('message-circle')} Aprobar&nbsp;+ WA</button>`:`<span style="font-size:11px;color:rgba(242,240,234,.3)">Sin WhatsApp</span>`}
          <button class="ad-btn" data-rechazar-post="${p.id}" style="font-size:12px" title="Rechazar">${ic('x')}</button>
        </div>
      </div>`;
    }).join('')}
    <hr style="border:none;border-top:1px solid rgba(242,240,234,.08);margin:16px 0 0">
  </div>`;
  tableWrap.insertAdjacentHTML('beforebegin',html);
  if(window.lucide)lucide.createIcons();
}
function htmlFormAliado(a={}){
  const sel=(a.categoria||'').split(',').map(s=>s.trim()).filter(Boolean);
  const chips=CATS.map(c=>`<button type="button" class="fa-chip${sel.includes(c)?' is-on':''}" data-cat="${c}">${c}</button>`).join('')+`<button type="button" class="fa-chip${sel.some(s=>!CATS.includes(s))?' is-on':''}" data-cat="__otra__" id="fa-chip-otra">Otra</button>`;
  const otraVal=sel.find(s=>!CATS.includes(s))||'';
  return `
  <div class="ad-field"><label>Nombre del negocio *</label><input id="fa-nombre" type="text" value="${(a.nombre||'').replace(/"/g,'&quot;')}" placeholder="Ej: Café del Parque"></div>
  <div class="ad-field"><label>Categoría</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:2px" id="fa-chips">${chips}</div>
    <input type="text" id="fa-cat-otra" placeholder="Describe la categoría" style="margin-top:10px;display:${otraVal?'block':'none'};width:100%;font-family:var(--cuerpo);font-size:13.5px;color:#1a1a18;padding:10px 14px;border:1.5px solid rgba(26,26,24,.13);border-radius:8px;background:#f5f4f0" value="${otraVal}">
    <input type="hidden" id="fa-cat" value="${(a.categoria||'').replace(/"/g,'&quot;')}"></div>
  <div class="ad-field"><label>Descuento</label><input id="fa-dsc" type="text" value="${(a.descuento||'').replace(/"/g,'&quot;')}" placeholder="Ej: 20%"></div>
  <div class="ad-field"><label>Descripción</label><textarea id="fa-desc" rows="3" placeholder="Describe el negocio y sus beneficios">${a.descripcion||''}</textarea></div>
  <div class="ad-field-2">
    <div class="ad-field"><label>WhatsApp</label><input id="fa-wa" type="tel" value="${(a.whatsapp||'').replace(/"/g,'&quot;')}" placeholder="300 000 0000"></div>
    <div class="ad-field"><label>Dirección</label><input id="fa-dir" type="text" value="${(a.direccion||'').replace(/"/g,'&quot;')}" placeholder="Calle, barrio"></div>
  </div>
  <div class="ad-field"><label>Link de Google Maps</label><input id="fa-maps" type="url" value="${(a.maps_url||'').replace(/"/g,'&quot;')}" placeholder="https://maps.app.goo.gl/..."></div>
  <div class="ad-field"><label>Foto del establecimiento</label>
    ${a.imagen_url?`<img src="${a.imagen_url}" style="width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-bottom:10px">`:''}
    <input id="fa-img" type="file" accept="image/*"><input type="hidden" id="fa-img-url" value="${a.imagen_url||''}"></div>
  <hr style="border:none;border-top:1px solid rgba(26,26,24,.12);margin:20px 0 14px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(26,26,24,.4)">Promociones de descuento</span>
    ${a.id?`<button type="button" class="ad-btn" id="fa-promo-nueva" style="font-size:12px">${ic("plus")} Agregar</button>`:''}
  </div>

  <div id="fa-promo-form-wrap" style="display:none;margin-top:12px;padding:16px;background:rgba(26,26,24,.03);border-radius:10px;border:1px solid rgba(26,26,24,.09)"></div>

function bindFormProf(){setTimeout(()=>{

let _promos=[];
async function cargarYMostrarPromociones(aliadoId,aliadoNombre){
  const{data}=await supabase.from('promociones').select('*').eq('aliado_id',aliadoId).order('created_at',{ascending:false});
  _promos=data||[];
  abrirModal(`Promociones — ${aliadoNombre}`,`${_promos.length} promoción${_promos.length!==1?'es':''} registrada${_promos.length!==1?'s':''}`,htmlListaPromociones(_promos,aliadoId,aliadoNombre));
  if(window.lucide)lucide.createIcons();
  bindListaPromociones(aliadoId,aliadoNombre);
}

function bindListaPromociones(aliadoId,aliadoNombre){
  setTimeout(()=>{
    $("#promo-cerrar")?.addEventListener('click',()=>window.cerrarModal?.());
    $("#promo-add")?.addEventListener('click',()=>{abrirModal('Nueva promoción',aliadoNombre,htmlFormPromocion({},aliadoId));bindFormPromocion(aliadoId,aliadoNombre,'');});

      btn.addEventListener('click',()=>{const p=_promos.find(x=>x.id===btn.dataset.edPromo);if(p){abrirModal('Editar promoción',p.descripcion,htmlFormPromocion(p,aliadoId));bindFormPromocion(aliadoId,aliadoNombre,p.id);}});
    });
    document.querySelectorAll('[data-rm-promo]').forEach(btn=>{

    });

  },80);
}

  <div class="ad-field"><label>Aplica a</label>
    <select id="pr-aplica" style="${fldStyle}">
      <option value="toda_la_tienda"${!p.aplica_a||p.aplica_a==='toda_la_tienda'?' selected':''}>Toda la tienda</option>
      <option value="producto_especifico"${p.aplica_a==='producto_especifico'?' selected':''}>Producto / servicio específico</option>

  <div id="pr-calc-porcentaje" style="display:${p.tipo==='porcentaje'?'block':'none'}">
    <div class="ad-field-2">
      <div class="ad-field"><label>Precio normal ($) <span style="font-weight:400;color:rgba(26,26,24,.4)">(referencia)</span></label><input id="pr-precio-n-pct" type="number" min="0" value="${p.tipo==='porcentaje'?p.precio_normal||'':''}" placeholder="Ej: 50000"></div>
      <div class="ad-field"><label>Descuento (%)</label><input id="pr-pct" type="number" min="0" max="100" value="${pctVal}" placeholder="Ej: 20"></div>
    </div>
    <div id="pr-ahorro-pct-prev" style="font-size:13px;color:#1a7a3c;font-weight:600;margin:-4px 0 8px;min-height:18px"></div>
  </div>
  <div id="pr-calc-monto" style="display:${p.tipo==='monto_fijo'?'block':'none'}">
    <div class="ad-field"><label>Monto de descuento ($)</label><input id="pr-ahorro-fijo" type="number" min="0" value="${p.tipo==='monto_fijo'?p.ahorro_fijo||'':''}" placeholder="Ej: 5000"></div>
  </div>
  <div id="pr-calc-precio" style="display:${p.tipo==='precio_especial'?'block':'none'}">
    <div class="ad-field-2">
      <div class="ad-field"><label>Precio normal ($)</label><input id="pr-precio-n" type="number" min="0" value="${p.tipo==='precio_especial'?p.precio_normal||'':''}" placeholder="Ej: 80000"></div>
      <div class="ad-field"><label>Precio con descuento ($)</label><input id="pr-precio-d" type="number" min="0" value="${p.tipo==='precio_especial'?p.precio_descuento||'':''}" placeholder="Ej: 60000"></div>
    </div>
    <div id="pr-ahorro-prev" style="font-size:13px;color:#1a7a3c;font-weight:600;margin:-4px 0 8px;min-height:18px"></div>
  </div>
  <div id="pr-calc-regalo" style="display:${p.tipo==='regalo'?'block':'none'}">
    <div class="ad-field"><label>Valor del regalo ($) <span style="font-weight:400;color:rgba(26,26,24,.4)">(opcional)</span></label><input id="pr-regalo-val" type="number" min="0" value="${p.tipo==='regalo'?p.ahorro_fijo||'':''}" placeholder="Ej: 10000"></div>
  </div>
  <div id="pr-calc-variable" style="display:${['2x1','personalizado'].includes(p.tipo)?'block':'none'}">
    <p style="font-size:12px;color:rgba(26,26,24,.5);padding:10px 14px;background:#f5f4f0;border-radius:8px;margin-bottom:4px">El ahorro se registra al momento del uso del descuento.</p>
  </div>

  <hr style="border:none;border-top:1px solid rgba(26,26,24,.1);margin:14px 0 10px">
  <div class="ad-field"><label>Días en que aplica</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px" id="pr-dias-chips">${diasChips}</div></div>
  <div class="ad-field-2">

  </div>

    <div class="ad-field"><label>Compra mínima ($) <span style="font-weight:400;color:rgba(26,26,24,.4)">(opcional)</span></label><input id="pr-min" type="number" min="0" value="${p.monto_minimo||''}" placeholder="0"></div>

      ${p.foto_url?`<img src="${p.foto_url}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;margin-bottom:6px;display:block">`:''}<input id="pr-foto" type="file" accept="image/*"><input type="hidden" id="pr-foto-url" value="${p.foto_url||''}"></div>
  </div>

  </div>`;
}
function bindFormPromocion(aliadoId,aliadoNombre,editId){
  setTimeout(()=>{
    const CALC_KEYS=['porcentaje','monto','precio','regalo','variable'];
    const showCalc=(tipo)=>{
      CALC_KEYS.forEach(k=>{const el=$(`#pr-calc-${k}`);if(el)el.style.display='none';});
      if(tipo==='porcentaje')$("#pr-calc-porcentaje").style.display='block';
      else if(tipo==='monto_fijo')$("#pr-calc-monto").style.display='block';
      else if(tipo==='precio_especial')$("#pr-calc-precio").style.display='block';
      else if(tipo==='regalo')$("#pr-calc-regalo").style.display='block';
      else if(['2x1','personalizado'].includes(tipo))$("#pr-calc-variable").style.display='block';
    };
    $("#pr-tipo")?.addEventListener('change',(e)=>showCalc(e.target.value));
    $("#pr-aplica")?.addEventListener('change',(e)=>{const w=$("#pr-prod-wrap");if(w)w.style.display=e.target.value==='producto_especifico'?'block':'none';});
    const updPrecio=()=>{const n=parseInt($("#pr-precio-n")?.value)||0;const d=parseInt($("#pr-precio-d")?.value)||0;const el=$("#pr-ahorro-prev");if(el)el.textContent=n&&d&&n>d?`Ahorro: $${(n-d).toLocaleString('es-CO')} por visita`:'';};
    $("#pr-precio-n")?.addEventListener('input',updPrecio);
    $("#pr-precio-d")?.addEventListener('input',updPrecio);
    updPrecio();
    const updPct=()=>{const n=parseInt($("#pr-precio-n-pct")?.value)||0;const pct=parseInt($("#pr-pct")?.value)||0;const el=$("#pr-ahorro-pct-prev");if(el)el.textContent=n&&pct?`Ahorro: $${Math.round(n*pct/100).toLocaleString('es-CO')} por visita`:'';};
    $("#pr-precio-n-pct")?.addEventListener('input',updPct);
    $("#pr-pct")?.addEventListener('input',updPct);
    updPct();
    document.querySelectorAll('#pr-dias-chips .fa-chip').forEach(chip=>chip.addEventListener('click',()=>chip.classList.toggle('is-on')));
    $("#pr-cancel")?.addEventListener('click',()=>{cargarYMostrarPromociones(aliadoId,aliadoNombre);});
    const btn=$("#pr-save");
    btn?.addEventListener('click',async()=>{
      const tipo=$("#pr-tipo")?.value;
      const descripcion=$("#pr-desc")?.value.trim();
      if(!tipo){toast('Selecciona el tipo de promoción');return;}
      if(!descripcion){toast('La descripción es obligatoria');return;}
      btn.disabled=true;btn.innerHTML=`${ic("loader")} Guardando…`;if(window.lucide)lucide.createIcons();
      let precio_normal=null,precio_descuento=null,ahorro_fijo=null;
      if(tipo==='precio_especial'){
        precio_normal=parseInt($("#pr-precio-n")?.value)||null;
        precio_descuento=parseInt($("#pr-precio-d")?.value)||null;
        if(precio_normal&&precio_descuento)ahorro_fijo=precio_normal-precio_descuento;
      }else if(tipo==='porcentaje'){
        precio_normal=parseInt($("#pr-precio-n-pct")?.value)||null;
        const pct=parseInt($("#pr-pct")?.value)||0;
        if(precio_normal&&pct){precio_descuento=Math.round(precio_normal*(1-pct/100));ahorro_fijo=precio_normal-precio_descuento;}
      }else if(tipo==='monto_fijo'){
        ahorro_fijo=parseInt($("#pr-ahorro-fijo")?.value)||null;
      }else if(tipo==='regalo'){
        ahorro_fijo=parseInt($("#pr-regalo-val")?.value)||null;
      }
      const diasActivos=[...document.querySelectorAll('#pr-dias-chips .fa-chip.is-on')].map(b=>b.dataset.dia);
      let foto_url=$("#pr-foto-url")?.value||null;
      const file=$("#pr-foto")?.files?.[0];
      if(file)try{foto_url=await subirImagen(file);}catch(_){toast('Error al subir la foto');}
      const payload={aliado_id:aliadoId,tipo,descripcion,
        aplica_a:$("#pr-aplica")?.value||'toda_la_tienda',
        producto_especifico:$("#pr-aplica")?.value==='producto_especifico'?($("#pr-prod")?.value.trim()||null):null,
        precio_normal,precio_descuento,ahorro_fijo,
        dias_aplica:diasActivos.length?diasActivos:['lunes','martes','miercoles','jueves','viernes','sabado','domingo'],
        hora_inicio:$("#pr-hora-ini")?.value||null,
        hora_fin:$("#pr-hora-fin")?.value||null,
        fecha_inicio:$("#pr-fecha-ini")?.value||null,
        fecha_fin:$("#pr-fecha-fin")?.value||null,
        monto_minimo:parseInt($("#pr-min")?.value)||0,
        foto_url,activa:$("#pr-activa")?.checked!==false};
      const id=btn.dataset.id||editId;
      const{error}=id?await supabase.from('promociones').update(payload).eq('id',id):await supabase.from('promociones').insert(payload);
      if(error){toast('Error: '+error.message);btn.disabled=false;btn.innerHTML=`${ic("check")} ${id?'Guardar cambios':'Guardar promoción'}`;if(window.lucide)lucide.createIcons();return;}
      cargarYMostrarPromociones(aliadoId,aliadoNombre);
      toast(id?'Promoción actualizada ✓':'Promoción creada ✓');
    });
    if(window.lucide)lucide.createIcons();
  },80);
}

  document.addEventListener('click',async(e)=>{
    if(e.target.closest('#btn-an-add')){abrirModal('Nuevo anuncio','Publica una novedad',htmlFormAnuncio());bindFormAnuncio();return;}
    const edAn=e.target.closest('[data-ed-an]');if(edAn){const a=_anuncios.find(x=>x.id===edAn.dataset.edAn);if(a){abrirModal('Editar anuncio',a.titulo,htmlFormAnuncio(a));bindFormAnuncio();}return;}
    const rmAn=e.target.closest('[data-rm-an]');if(rmAn&&confirm('¿Eliminar este anuncio?')){await supabase.from('anuncios').delete().eq('id',rmAn.dataset.rmAn);cargarAnuncios();toast('Anuncio eliminado');return;}
    if(e.target.closest('#btn-prog-add')){abrirModal('Nuevo programa','Se publicará en la web',htmlFormProg());bindFormProg();return;}
    const edProg=e.target.closest('[data-ed-prog]');if(edProg){const p=_programas.find(x=>x.id===edProg.dataset.edProg);if(p){abrirModal('Editar programa',p.nombre,htmlFormProg(p));bindFormProg();}return;}
    const togProg=e.target.closest('[data-tog-prog]');if(togProg){const activo=togProg.dataset.activo==='true';await supabase.from('programas').update({activo:!activo}).eq('id',togProg.dataset.togProg);cargarProgramas();return;}
    const rmProg=e.target.closest('[data-rm-prog]');if(rmProg&&confirm('¿Eliminar este programa?')){await supabase.from('programas').delete().eq('id',rmProg.dataset.rmProg);cargarProgramas();toast('Programa eliminado');return;}
    if(e.target.closest('#btn-prof-add')){abrirModal('Agregar profesional','Se publicará en el directorio',htmlFormProf());bindFormProf();return;}
    const aprobarProf=e.target.closest('[data-aprobar-prof]');if(aprobarProf){const id=aprobarProf.dataset.aprobarProf;const waUrl=aprobarProf.dataset.waProf;await supabase.from('profesionales').update({estado:'aprobado'}).eq('id',id);if(waUrl)window.open(waUrl,'_blank');cargarProfesionales();toast('Profesional aprobado — notificando por WhatsApp…');return;}
    const activarProf=e.target.closest('[data-activar-prof]');if(activarProf){await supabase.from('profesionales').update({estado:'activo',activo:true}).eq('id',activarProf.dataset.activarProf);cargarProfesionales();toast('Profesional activado ✓');return;}
    const desactivarProf=e.target.closest('[data-desactivar-prof]');if(desactivarProf){await supabase.from('profesionales').update({estado:'pendiente',activo:false}).eq('id',desactivarProf.dataset.desactivarProf);cargarProfesionales();toast('Profesional desactivado');return;}
    const aprobarPost=e.target.closest('[data-aprobar-post]');if(aprobarPost){const id=aprobarPost.dataset.aprobarPost;const waUrl=aprobarPost.dataset.waPost;const nombre=aprobarPost.dataset.nomPost;const categoria=aprobarPost.dataset.catPost;const whatsapp=aprobarPost.dataset.telPost;await supabase.from('aliados').insert({nombre,categoria,whatsapp,activo:false});await supabase.from('aliados_postulaciones').update({estado:'aprobado'}).eq('id',id);if(waUrl)window.open(waUrl,'_blank');window.renderAliados?.();toast('Aliado aprobado — notificando por WhatsApp…');return;}
    const rechazarPost=e.target.closest('[data-rechazar-post]');if(rechazarPost&&confirm('¿Rechazar esta postulación?')){await supabase.from('aliados_postulaciones').update({estado:'rechazado'}).eq('id',rechazarPost.dataset.rechazarPost);window.renderAliados?.();toast('Postulación rechazada');return;}
    const edProf=e.target.closest('[data-ed-prof]');if(edProf){const p=_profesionales.find(x=>x.id===edProf.dataset.edProf);if(p){abrirModal('Editar profesional',p.nombre,htmlFormProf(p));bindFormProf();}return;}
    const togProf=e.target.closest('[data-tog-prof]');if(togProf){const activo=togProf.dataset.activo==='true';await supabase.from('profesionales').update({activo:!activo}).eq('id',togProf.dataset.togProf);cargarProfesionales();return;}
    const rmProf=e.target.closest('[data-rm-prof]');if(rmProf&&confirm('¿Eliminar este profesional?')){await supabase.from('profesionales').delete().eq('id',rmProf.dataset.rmProf);cargarProfesionales();toast('Profesional eliminado');return;}
    const promosAl=e.target.closest('[data-promos-aliado]');if(promosAl){cargarYMostrarPromociones(promosAl.dataset.promosAliado,promosAl.dataset.nomAliado);return;}
    const edAl=e.target.closest('[data-ed-aliado]');if(edAl){const a=_aliados.find(x=>x.id===edAl.dataset.edAliado);if(a){abrirModal('Editar aliado',a.nombre,htmlFormAliado(a));bindFormAliado();}return;}
    const togAl=e.target.closest('[data-tog-aliado]');if(togAl){const activo=togAl.dataset.activo==='true';await supabase.from('aliados').update({activo:!activo}).eq('id',togAl.dataset.togAliado);cargarAliados();return;}
    const rmAl=e.target.closest('[data-rm-aliado]');if(rmAl&&confirm('¿Eliminar este aliado?')){await supabase.from('aliados').delete().eq('id',rmAl.dataset.rmAliado);cargarAliados();toast('Aliado eliminado');return;}
  });
});
  </script>
